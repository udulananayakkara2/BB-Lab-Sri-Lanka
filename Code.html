        .card img { width: 100%; height: 300px; object-fit: contain; margin-bottom: 20px; }
        .btn-order { background: var(--dark-purple); color: white; padding: 12px 30px; border-radius: 30px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 20px; }
